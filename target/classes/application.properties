# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/lexiai_db
spring.datasource.username=lexiai
spring.datasource.password=lexiai123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Server Configuration
server.port=8080

# JWT Configuration
lexiai.jwt.secret=lexiaiSecretKey12345678901234567890123456789012
lexiai.jwt.expiration=86400

# Logging Configuration
logging.level.com.lexiai=DEBUG
logging.level.org.springframework.security=DEBUG

# Web Scraping Configuration
lexiai.scraping.timeout=10000
lexiai.scraping.max-retries=2
lexiai.scraping.delay-between-requests=500

# Database Performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Async Configuration
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=25

# Application Configuration
# OpenAI API Configuration
openai.api.key=
openai.api.url=https://api.openai.com/v1/chat/completions
spring.application.name=LexiAI Backend
spring.profiles.active=dev
