# Production Configuration
spring.datasource.url=jdbc:mysql://mysql:3306/lexiai_db
spring.datasource.username=lexiai
spring.datasource.password=lexiai123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Server Configuration
server.port=8080

# JWT Configuration  
lexiai.jwt.secret=lexiaiProductionSecretKey123456789012345678901234567890
lexiai.jwt.expiration=86400

# Logging Configuration (Production)
logging.level.com.lexiai=INFO
logging.level.root=WARN
logging.level.org.springframework.security=WARN

# Web Scraping Configuration
lexiai.scraping.timeout=30000
lexiai.scraping.max-retries=3
lexiai.scraping.delay-between-requests=1000

# Application Configuration
spring.application.name=LexiAI Backend
spring.profiles.active=production

# Production optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
